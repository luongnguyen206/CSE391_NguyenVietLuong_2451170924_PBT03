<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="debug_layout.css">
</head>
<body>
    <h2>Cách 1: Dùng border-box</h2>
    <div class="container solution-1">
        <aside class="sidebar">
            <h3>Sidebar</h3>
            <p>300px padding: 20px</p>
        </aside>
        <main class="content">
            <h3>Content</h3>
            <p>660px padding: 30px</p>
        </main>
        <div style="clear: both;"></div>
    </div>

    <h2>Cách 2: Không dùng border-box - Tính toán lại width</h2>
    <div class="container solution-2">
        <aside class="sidebar sidebar-adjusted">
            <h3>Sidebar</h3>
            <p>280px + padding: 20px</p>
        </aside>
        <main class="content content-adjusted">
            <h3>Content</h3>
            <p>628px + padding: 30px</p>
        </main>
        <div style="clear: both;"></div>
    </div>
</body>
</html>
